name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '8.0', '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Composer install
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHPCS (WordPress Coding Standards)
        # Informational for now — surface style violations in the run
        # log without blocking the build. A follow-up pass will clean
        # the inherited LW codebase up to a zero-error baseline; once
        # that lands, drop `continue-on-error` so style regressions
        # gate the CI again.
        continue-on-error: true
        run: composer phpcs

      - name: PHPUnit
        run: composer test
